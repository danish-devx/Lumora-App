<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumora – Edit Profile</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="editprofile.css">
</head>

<body>


  <div class="sphere sphere-1"></div>
  <div class="sphere sphere-2"></div>

  <div class="profile-wrapper">

    <div class="profile-card-wrapper">
      <div class="profile-card">


        <div class="auth-header">
          <div class="auth-brand">
            <div class="brand-icon">
              <i class="fas fa-bolt"></i>
              <span class="icon-glow"></span>
            </div>
            <span class="brand-name">Lumora</span>
            <span class="brand-tag">VIP</span>
          </div>
        </div>

        <hr class="section-divider">


        <div class="panel-header">
          <a href="profile.html" class="back-dashboard-btn"><i class="fas fa-arrow-left"></i> Back to Profile</a>
          <div class="panel-title">
            <h2>Account Settings</h2>
            <p>Update your elite credentials and public identity</p>
          </div>
        </div>


        <form id="editProfileForm" action="#" method="POST" enctype="multipart/form-data">


          <div class="avatar-upload-section">
            <div class="avatar-preview-container">

              <img src="images/file_00000000161c720885506c38d76251b9.png" alt="Profile Avatar" id="avatarPreview">
              <div class="avatar-overlay" id="uploadTrigger">
                <i class="fas fa-camera"></i>
                <span>Change Image</span>
              </div>
              <input type="file" id="avatarFileInput" accept="image/*" hidden>
            </div>
            <div class="avatar-instructions">
              <h3>Profile Picture</h3>
              <p>Recommended: Square JPG or PNG (Min 500x500px)</p>
            </div>
          </div>


          <div class="form-grid">


            <div class="form-group">
              <label for="profileName">Full Name</label>
              <div class="input-wrapper">
                <input type="text" id="profileName" placeholder="Enter your full name" required>
                <i class="fas fa-user"></i>
              </div>
            </div>


            <div class="form-group">
              <label for="profileUsername">Username</label>
              <div class="input-wrapper username-field">
                <input type="text" id="profileUsername" placeholder="username" required>
                <i class="fas fa-at"></i>
                <span class="vip-verify-badge"><i class="fas fa-check-circle"></i> Available</span>
              </div>
            </div>

          </div>


          <div class="panel-actions">
            <button type="button" class="btn-cancel" id="cancelBtn">Discard Changes</button>
            <button type="submit" class="btn-save">
              <span>Save Changes</span> <i class="fas fa-check"></i>
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="editprofile.js"></script>

</body>

</html>
