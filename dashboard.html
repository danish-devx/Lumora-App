  <meta charset="UTF-8" />

  <title>Lumora – Social Dashboard</title>

    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
    rel="stylesheet" />

  <nav class="navbar">
    <div class="nav-brand">
      <div class="brand-icon"><i class="fas fa-crown"></i></div>
      <div class="brand-name">Lumora</div>
      <div class="brand-tag">VIP</div>
    </div>

    <div class="nav-right">
      <div class="nav-search">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search Lumora…" />
      </div>
      <div class="nav-icon-btn"><i class="fas fa-bell"></i><span class="notif-dot"></span></div>
      <div class="nav-icon-btn"><i class="fas fa-message"></i></div>
      <div class="logout-btn" id="logout-btn">
        <i class="fas fa-arrow-right-from-bracket"></i>
        <span class="logout-text">Log Out</span>
      </div>
      <div class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    </div>
  </nav>


  <div class="layout">


    <aside class="sidebar" id="sidebar">
      <div class="sidebar-glass">
        <div class="profile-banner">
          <div class="profile-banner-bg"></div>
          <div class="banner-accent"></div>
          <div class="banner-overlay"></div>
        </div>
        <div class="profile-info">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar">
              <img src="images/file_00000000161c720885506c38d76251b9.png" alt="Profile" id="profile-image">
            </div>
            <span class="avatar-online"></span>
          </div>
          <div class="profile-name" id="profile-name">--- --</div>
          <div class="profile-username" id="profile-username">--- --</div>
          <div class="profile-bio">✦ Living life in golden hours · Creator · Dreamer</div>
        </div>
        <div class="profile-stats">
          <div class="stat"><span class="stat-num" id="totalPost">00</span><span class="stat-label">Posts</span></div>
          <div class="stat"><span class="stat-num">0.0K</span><span class="stat-label">Followers</span></div>
          <div class="stat"><span class="stat-num">0.0K</span><span class="stat-label">Following</span></div>
        </div>
        <div class="side-nav">
          <div class="side-section-label" style="margin-top:6px">Account</div>
          <div class="side-link active" onclick="closeSidebar()" id="myprofile"><i class="fas fa-user"></i> My Profile
          </div>
          <div class="side-link" onclick="closeSidebar()"><i class="fas fa-gear"></i> Settings</div>
          <div class="side-link" onclick="closeSidebar()"><i class="fas fa-crown"></i> Upgrade VIP</div>
        </div>
      </div>
    </aside>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="dashboard.js"></script>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('open');
      document.body.classList.toggle('sidebar-open');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.body.classList.remove('sidebar-open');
    }
  </script>
