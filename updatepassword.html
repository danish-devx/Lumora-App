<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumora – Update Security Vault</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="updatepassword.css">
</head>

<body>

  <div class="sphere sphere-1"></div>
  <div class="sphere sphere-2"></div>

  <div class="auth-wrapper">
    <div class="auth-card-glowing-wrapper">
      <div class="auth-card">

        <div class="auth-header">
          <div class="auth-brand">
            <div class="brand-icon"><i class="fas fa-bolt"></i></div>
            <span class="brand-name">Lumora</span>
            <span class="brand-tag">VIP</span>
          </div>

          <div class="page-title">
            <h2>Reset Credentials</h2>
            <p>Establish a highly secure, cryptographic password for your executive account</p>
          </div>
        </div>

        <form id="updatePasswordForm" class="auth-form" action="#">

          <div class="form-group">
            <label for="newPassword">New Security Password</label>
            <div class="input-wrapper">
              <input type="password" id="newPassword" placeholder="••••••••" required>
              <i class="fas fa-lock"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Vault Password</label>
            <div class="input-wrapper">
              <input type="password" id="confirmPassword" placeholder="••••••••" required>
              <i class="fas fa-shield-alt"></i>
            </div>
          </div>

          <button type="submit" class="auth-btn">
            <span>Update Security Vault</span> <i class="fas fa-vault"></i>
          </button>

        </form>

        <div class="auth-footer">
          <a href="index.html" class="back-portal-link">
            <i class="fas fa-chevron-left"></i> Abort & Return to Login
          </a>
        </div>

      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="updatepassword.js"></script>
</body>

</html>
